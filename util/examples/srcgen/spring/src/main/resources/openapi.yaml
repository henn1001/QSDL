components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: X-API-Key
      in: header

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'

  parameters:
    cursor:
      name: cursor
      description: |
        Paginate through collections of data by setting the cursor parameter to a next_cursor attribute returned by a previous response.
      in: query
      required: false
      schema:
        type: string
    limit:  
      name: limit
      description: |
        The maximum number of items to return.
      in: query
      required: false
      schema:
        type: integer
        format: int64
    count:
      name: count
      description: |
        Returns the total number of items in the collection.
      in: query
      required: false
      schema:
        type: boolean

  schemas:
    Status:
      type: string
      enum:
        - OPEN
        - TO_DO
        - CLOSED

    BaseType:
      required:
        - name
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        creation_by:
          type: string
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          type: object

    ProjectList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Project:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
        description:
          type: string
        creation_by:
          type: string
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          type: object
        archive:
          type: boolean
          writeOnly: true

    RoleList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Role:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string

    UserList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    User:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string

    TicketList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Ticket:
      required:
        - id
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        title:
          type: string
        body:
          type: string
        status:
          $ref: '#/components/schemas/Status'

    AppError:
      required:
        - code
        - message
      type: object
      properties:
        code:
          description: A identifier that categorizes the error
          type: integer
          format: int32
        message:
          description: A brief, human-readable message about the error
          type: string
        status:
          description: The HTTP response code
          type: integer
          format: int32
        path:
          description: A URI that identifies the specific occurrence of the error
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          description: Detailed explanations of the error
          type: array
          items:
            type: string