### Core
server.port=8080
server.base-path=/api/v1

### Custom

# H2
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
spring.h2.console.path=/api/h2
# Datasource
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update

### Monitoring service
management.endpoints.web.base-path=/api/actuator
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,prometheus,logfile
management.endpoints.web.exposure.exclude=
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET

#### INFO ENDPOINT CONFIGURATION
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@

### Logging
logging.file.name=logs/spring.log

### SSL
server.ssl.enabled=${SPRING_SSL:false}
server.ssl.key-store-type=${SPRING_SSL_TYPE:pkcs12}
server.ssl.key-store=${SPRING_SSL_STORE:classpath:keystore.p12}
server.ssl.key-store-password=${SPRING_SSL_STORE_PASSWORD:password}
server.ssl.key-alias=${SPRING_SSL_ALIAS:alias}
