type Query {
    _empty: String
}

type Mutation {
    _empty: String
}

interface Response {
  code: String!
  success: Boolean!
  message: String!
  details: String
}

input Pageable {
  cursor: String
  limit: Int
  count: Boolean
}

enum Status {
    OPEN
    TO_DO
    CLOSED
}

interface Rating {
    user: User
    scores: [Float]
}

input RatingInput {
    user: ID
    scores: [Float]
}

interface Metric {
    likes: Int
    ratings: [Rating]
}

input MetricInput {
    likes: Int
    ratings: [RatingInput]
}

interface BaseType {
    id: ID!
    name: String!
    description: String
    creation_by: String
    creation_date: Date
    last_update_by: String
    last_update_date: Date
    meta_inf: Object
}

# begin object Project 
type Project implements BaseType {
    id: ID!
    name: String!
    description: String
    creation_by: String
    creation_date: Date
    last_update_by: String
    last_update_date: Date
    meta_inf: Object
    metrics: [Metric]
    tickets: [Ticket]
    roles: [Role]
    milestones: [Milestone]
}

type ProjectList {
    items: [Project]!
    next_cursor: String
    total_count: Int
}

input ProjectInput {
    name: String!
    description: String
    meta_inf: Object
    archive: Boolean
    metrics: [MetricInput]
}

extend type Query {
    getProjects(name: String, pageable: Pageable): ProjectList
    getProject(id: ID!): Project
}

extend type Mutation {
    createProject(body: ProjectInput!): createProjectPayload
    replaceProject(id: ID!, body: ProjectInput!): replaceProjectPayload
    updateProject(id: ID!, body: ProjectInput!): updateProjectPayload
    deleteProject(id: ID!): deleteProjectPayload
}

type createProjectPayload implements Response {
    code: String!
    success: Boolean!
    message: String!
    details: String
    response: Project
}

type replaceProjectPayload implements Response {
    code: String!
    success: Boolean!
    message: String!
    details: String
    response: Project
}

type updateProjectPayload implements Response {
    code: String!
    success: Boolean!
    message: String!
    details: String
    response: Project
}

type deleteProjectPayload implements Response {
    code: String!
    success: Boolean!
    message: String!
    details: String
}
# end object Project

