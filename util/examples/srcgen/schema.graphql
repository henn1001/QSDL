type Query {
    _empty: String
}

type Mutation {
    _empty: String
}

interface Response {
  code: String!
  success: Boolean!
  message: String!
  details: String
}

enum Status {
    OPEN
    TO_DO
    CLOSED
}

interface Rating {
    user: User
    scores: [Float]
}

input RatingInput {
    user: ID
    scores: [Float]
}

interface Metric {
    likes: Int
    ratings: [Rating]
}

input MetricInput {
    likes: Int
    ratings: [RatingInput]
}

interface BaseType {
    id: ID!
    name: String!
    "Optional description"
    description: String
    creation_by: String
    creation_date: Date
    last_update_by: String
    last_update_date: Date
    """ 
      Accepts any valid json object.
      """
    meta_inf: Object
}

# begin object Project 
""" 
Test multiline description for objects
"""
type Project implements BaseType {
    id: ID!
    name: String!
    "Optional description"
    description: String
    creation_by: String
    creation_date: Date
    last_update_by: String
    last_update_date: Date
    """ 
      Accepts any valid json object.
      """
    meta_inf: Object
    """ 
      A nested metrics object.
      """
    metrics: [Metric]
    tickets: [Ticket]
    roles: [Role]
    milestones: [Milestone]
}

extend type Query {
    getProjects(name: String): [Project]
    getProject(id: ID!): Project
}

extend type Mutation {
    createProject(input: createProjectInput!): createProjectPayload
    updateProject(id: ID!, input: updateProjectInput!): updateProjectPayload
    deleteProject(id: ID!): deleteProjectPayload
}

input createProjectInput {
    name: String!
    description: String
    meta_inf: Object
    archive: Boolean
    metrics: [MetricInput]
}

input updateProjectInput {
    name: String!
    description: String
    meta_inf: Object
    archive: Boolean
    metrics: [MetricInput]
}

type createProjectPayload implements Response {
    code: String!
    success: Boolean!
    message: String!
    details: String
    response: Project
}

type updateProjectPayload implements Response {
    code: String!
    success: Boolean!
    message: String!
    details: String
    response: Project
}

type deleteProjectPayload implements Response {
    code: String!
    success: Boolean!
    message: String!
    details: String
}
# end object Project

