components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: X-API-Key
      in: header

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:
    Status:
      type: string
      enum:
        - OPEN
        - TO_DO
        - CLOSED

    Rating:
      type: object
      properties:
        user:
          type: string
        scores:
          type: array
          items:
            type: number
          format: float

    Metric:
      type: object
      properties:
        likes:
          type: integer
          format: int32
        ratings:
          type: array
          items:
            $ref: '#/components/schemas/Rating'

    Basetype:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          x-qsdl-type: ID
          readOnly: true
        name:
          type: string
        description:
          description: |
            Optional description
          type: string
        creation_by:
          type: string
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          description: |
            Accepts any valid json object.
          type: object

    Project:
      description: |
        Test multiline description for objects
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          x-qsdl-type: ID
          readOnly: true
        name:
          type: string
        description:
          description: |
            Optional description
          type: string
        creation_by:
          type: string
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          description: |
            Accepts any valid json object.
          type: object
        archive:
          description: |
            Archive this Project
          type: boolean
          writeOnly: true
        metrics:
          description: |
            A nested metrics object.
          type: array
          items:
            $ref: '#/components/schemas/Metric'

    Role:
      description: |
        Test singleline description for objects
      required:
        - role
      type: object
      properties:
        role:
          type: string
          x-qsdl-type: ID
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    User:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          x-qsdl-type: ID
        full_name:
          type: string
        emails:
          type: array
          items:
            type: string
        password:
          type: string

    Ticket:
      required:
        - number
      type: object
      properties:
        number:
          type: string
          x-qsdl-type: ID
        title:
          type: string
        issuer:
          type: string
        issuer_body:
          allOf:
            - $ref: '#/components/schemas/User'
          readOnly: true
        body:
          type: string
        status:
          $ref: '#/components/schemas/Status'

    Milestone:
      required:
        - milestone
      type: object
      properties:
        milestone:
          type: string
          x-qsdl-type: ID

    Sprint:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          x-qsdl-type: ID
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'

    Buzzword:
      description: |
        To test object without a ID
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          x-qsdl-type: ID
        name:
          type: string

    Querymachine:
      description: |
        To test custom paths
      required:
        - request
      type: object
      properties:
        request:
          type: string
          writeOnly: true
        response:
          type: object
          readOnly: true

    ApiError:
      required:
        - code
        - message
      type: object
      properties:
        code:
          description: A identifier that categorizes the error
          type: integer
          format: int32
        message:
          description: A brief, human-readable message about the error
          type: string
        status:
          description: The HTTP response code
          type: integer
          format: int32
        path:
          description: A URI that identifies the specific occurrence of the error
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          description: Detailed explanations of the error
          type: array
          items:
            type: string