components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: X-API-Key
      in: header

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'

  schemas:
    Status:
      type: string
      enum:
        - OPEN
        - TO_DO
        - CLOSED

    Rating:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        scores:
          type: array
          items:
            type: number
          format: float

    Metric:
      type: object
      properties:
        likes:
          type: integer
          format: int32
        ratings:
          type: array
          items:
            $ref: '#/components/schemas/Rating'

    BaseType:
      required:
        - name
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        creation_by:
          type: string
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          type: object

    ProjectList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Project:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
        description:
          type: string
        creation_by:
          type: string
          readOnly: true
        creation_date:
          type: string
          format: date-time
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          type: object
        archive:
          type: boolean
          writeOnly: true
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/Metric'

    RoleList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Role:
      required:
        - id
        - role
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        role:
          type: integer
          format: int32

    UserList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    User:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: integer
          format: int32
        full_name:
          type: string
        emails:
          type: array
          items:
            type: string
        password:
          type: string

    TicketList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Ticket:
      required:
        - id
        - number
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        number:
          type: integer
          format: int32
        title:
          type: string
        issuer:
          $ref: '#/components/schemas/User'
        issuer_body:
          $ref: '#/components/schemas/User'
          readOnly: true
        body:
          type: string
        status:
          $ref: '#/components/schemas/Status'

    MilestoneList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Milestone:
      required:
        - id
        - milestone
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        milestone:
          type: integer
          format: int32

    SprintList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Sprint'
        next_cursor:
          type: string
        total_count:
          type: integer
          format: int64

    Sprint:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: integer
          format: int32

    Buzzword:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string

    QueryMachine:
      required:
        - id
        - request
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        request:
          type: string
          writeOnly: true
        response:
          type: object
          readOnly: true

    AppError:
      required:
        - code
        - message
      type: object
      properties:
        code:
          description: A identifier that categorizes the error
          type: integer
          format: int32
        message:
          description: A brief, human-readable message about the error
          type: string
        status:
          description: The HTTP response code
          type: integer
          format: int32
        path:
          description: A URI that identifies the specific occurrence of the error
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          description: Detailed explanations of the error
          type: array
          items:
            type: string