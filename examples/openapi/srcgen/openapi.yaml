components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'

  parameters:
    cursor:
      name: cursor
      description: |
        Paginate through collections of data by setting the cursor parameter to a next_cursor attribute returned by a previous response.
      in: query
      required: false
      schema:
        type: string
    limit:  
      name: limit
      description: |
        The maximum number of items to return.
      in: query
      required: false
      schema:
        type: integer
        format: int32
    count:
      name: count
      description: |
        Returns the total number of items available.
      in: query
      required: false
      schema:
        type: boolean

  schemas:
    Status:
      type: string
      enum:
        - OPEN
        - TO_DO
        - CLOSED

    Rating:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        scores:
          type: array
          items:
            type: number
            format: float
            minimum: 0

    Metric:
      type: object
      properties:
        likes:
          type: integer
          format: int32
          minimum: 0
        ratings:
          type: array
          items:
            $ref: '#/components/schemas/Rating'

    ProjectList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Project:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        creation_by:
          type: string
          readOnly: true
          maxLength: 255
        creation_date:
          type: string
          format: date
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
          maxLength: 255
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          type: object
        archive:
          type: boolean
          writeOnly: true
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/Metric'

    RoleList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Role:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        name:
          type: integer
          format: int32
          minimum: 0

    UserList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    User:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        name:
          type: integer
          format: int32
          minimum: 0
        full_name:
          type: string
          maxLength: 255
        emails:
          type: array
          items:
            type: string
            maxLength: 255
        password:
          type: string
          maxLength: 255

    TicketList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Ticket:
      required:
        - id
        - number
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        number:
          type: integer
          format: int32
          minimum: 0
        title:
          type: string
          maxLength: 255
          default: Duke
        issuer_id:
          type: integer
          format: int32
          minimum: 0
          default: 42
        issuer_body:
          $ref: '#/components/schemas/User'
          readOnly: true
        body:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/Status'
          default: OPEN

    MilestoneList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Milestone:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        name:
          type: integer
          format: int32
          minimum: 0

    SprintList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Sprint'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Sprint:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        name:
          type: integer
          format: int32
          minimum: 0

    BuzzwordList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Buzzword'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Buzzword:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        name:
          type: string
          maxLength: 255

    QueryMachine:
      required:
        - id
        - request
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          minimum: 0
        request:
          type: string
          writeOnly: true
          maxLength: 255
        response:
          type: object
          readOnly: true

    AppError:
      required:
        - code
        - message
      type: object
      properties:
        code:
          description: A identifier that categorizes the error
          type: string
        message:
          description: A brief, human-readable message about the error
          type: string
        status:
          description: The HTTP response code
          type: integer
          format: int32
        path:
          description: A URI that identifies the specific occurrence of the error
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          description: Detailed explanations of the error
          type: array
          items:
            type: string