name: app

services:
  backend:
    image: maven:3.9-eclipse-temurin-25
    command:
      - mvn
      - spring-boot:run
      - -Dspring-boot.run.profiles=prod
    network_mode: host
    volumes:
      - ./:/usr/src/mymaven:rw
      - m2data:/root/.m2/repository
    working_dir: /usr/src/mymaven
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432

volumes:
  m2data:
