components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppError'

  parameters:
    cursor:
      name: cursor
      description: |
        Paginate through collections of data by setting the cursor parameter to a next_cursor attribute returned by a previous response.
      in: query
      required: false
      schema:
        type: string
    limit:  
      name: limit
      description: |
        The maximum number of items to return.
      in: query
      required: false
      schema:
        type: integer
        format: int32
    count:
      name: count
      description: |
        Returns the total number of items available.
      in: query
      required: false
      schema:
        type: boolean

  schemas:
    Status:
      type: string
      enum:
        - OPEN
        - TO_DO
        - CLOSED

    BaseType:
      required:
        - name
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        creation_by:
          type: string
          readOnly: true
          maxLength: 255
        creation_date:
          type: string
          format: date
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
          maxLength: 255
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          type: object

    ProjectList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Project:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          readOnly: true
          maxLength: 255
        name:
          type: string
          maxLength: 255
        description:
          type: string
          maxLength: 255
        creation_by:
          type: string
          readOnly: true
          maxLength: 255
        creation_date:
          type: string
          format: date
          readOnly: true
        last_update_by:
          type: string
          readOnly: true
          maxLength: 255
        last_update_date:
          type: string
          format: date-time
          readOnly: true
        meta_inf:
          type: object
        archive:
          type: boolean
          writeOnly: true

    RoleList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Role:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          readOnly: true
          maxLength: 255
        name:
          type: string
          maxLength: 255

    UserList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    User:
      required:
        - id
        - name
      type: object
      properties:
        id:
          type: string
          readOnly: true
          maxLength: 255
        name:
          type: string
          maxLength: 255
        mail:
          type: string
          maxLength: 255
        tmp:
          type: string
          maxLength: 255

    TicketList:
      required:
        - items
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
        next_cursor:
          type: string
          maxLength: 255
        total_count:
          type: integer
          format: int64
          minimum: 0

    Ticket:
      required:
        - id
      type: object
      properties:
        id:
          type: string
          readOnly: true
          maxLength: 255
        number:
          type: integer
          format: int32
          minimum: 0
          default: 42
        title:
          type: string
          maxLength: 255
          default: Witty Title
        body:
          type: string
          maxLength: 255
        status:
          $ref: '#/components/schemas/Status'
          default: OPEN

    AppError:
      required:
        - code
        - message
      type: object
      properties:
        code:
          description: A identifier that categorizes the error
          type: string
        message:
          description: A brief, human-readable message about the error
          type: string
        status:
          description: The HTTP response code
          type: integer
          format: int32
        path:
          description: A URI that identifies the specific occurrence of the error
          type: string
        timestamp:
          type: string
          format: date-time
        details:
          description: Detailed explanations of the error
          type: array
          items:
            type: string