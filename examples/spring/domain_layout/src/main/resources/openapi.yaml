openapi: 3.1.0
info:
  title: Test API
  description: |
    A simple parent child relation example.
    
    Tests:
      -  extending from a base
      -  read & writeOnly
      -  compositions
      -  aggregations
      -  usage of enums and generic json object
  version: '1.0'
servers:
  - url: '/api/v1'
security:
  - ApiKeyAuth: []
tags:
  - name: Management
  - name: Incident

