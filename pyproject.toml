[tool.poetry]
name = "qsdl"
version = "0.1.0"
description = "A Schema-Definition-Language inspired by GraphQl"
authors = ["henn1001 <henn1001@outlook.com>"]
license = "Apache-2.0"
include = [
    "README.md",
    "qsdl/definition/entity.tx",
    "qsdl/templates/openapi.j2",
    "qsdl/templates/openapi.macro.j2",
    "qsdl/templates/uml.j2",
]

[tool.poetry.dependencies]
python = "^3.6"
textx = "^2.1.0"
plantuml = "^0.3.0"
jinja2 = "^2.11.2"
inflect = "^4.1.0"

[tool.poetry.dev-dependencies]
pylint = "^2.5.3"
black = "^19.10b0"
pytest = "^6.0.1"
pytest-cov = "^2.10.0"
pyyaml = "^5.3.1"

[tool.poetry.scripts]
qsdl = "qsdl.__main__:entrypoint"

[tool.pytest.ini_options]
addopts = "--cov=qsdl --cov-report html:dist/coverage"
testpaths = [
    "tests",
]

[tool.pylint.messages_control]
disable = [
    "protected-access",
    "bad-continuation",
    "too-few-public-methods",
    "too-many-instance-attributes",
]

[build-system]
requires = ["poetry>=0.12"]
build-backend = "poetry.masonry.api"
