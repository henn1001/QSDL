[tool.poetry]
name = "qsdl"
version = "4.2.0"
description = "A Schema-Definition-Language Generator inspired by GraphQl."
authors = ["henn1001 <henn1001@outlook.com>"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://gitlab.com/henn1001/qsdl"
repository = "https://gitlab.com/henn1001/qsdl"
include = [
    "README.md",
]

[tool.poetry.dependencies]
python = ">=3.11, <3.13"
textx = "^4.0.1"
jinja2 = "^3.1.4"
pyyaml = "^6.0.1"
plantuml = "^0.3.0"
click = "^8.1.7"
pathspec = "^0.12.1"
stringcase = "^1.2.0"
pyfiglet = "^1.0.2"
dacite = "^1.8.1"
inquirer = "^3.2.4"

[tool.poetry.group.dev.dependencies]
pylint = "^3.2.0"
black = "^24.4.2"
pytest = "^8.2.0"
pytest-cov = "^5.0.0"
pytest-order = "^1.2.1"
openapi-spec-validator = "^0.5.1"

[tool.poetry.scripts]
qsdl = "qsdl.__main__:entrypoint"

[tool.pytest.ini_options]
junit_family = "xunit2"
addopts = "--junitxml=dist/tests/report.xml --cov=qsdl --cov-report term --cov-report html:dist/coverage"
testpaths = [
    "tests",
]

[tool.pylint.SIMILARITIES]
min-similarity-lines = 10

[tool.pylint.messages_control]
disable = [
    "broad-exception-raised",
    "cyclic-import",
    "duplicate-code",
    "line-too-long",
    "protected-access",
    "too-few-public-methods",
    "too-many-instance-attributes",
]

[tool.black]
line-length = 120

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[build-system]
requires = ["poetry-core>=1.0.8"]
build-backend = "poetry.core.masonry.api"
