[tool.poetry]
name = "qsdl"
version = "2.3.0"
description = "A Schema-Definition-Language Generator inspired by GraphQl."
authors = ["henn1001 <henn1001@outlook.com>"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://gitlab.com/henn1001/qsdl"
repository = "https://gitlab.com/henn1001/qsdl"
include = [
    "README.md",
    "qsdl/dsl/definition/*",
    "qsdl/generators/graphql/template/*",
    "qsdl/generators/openapi/template/*",
    "qsdl/generators/plantuml/template/*",
]

[tool.poetry.dependencies]
python = "^3.7"
textx = "2.3.0"
jinja2 = "3.0.1"
pyyaml = "5.4.1"
plantuml = "0.3.0"
click = "8.0.1"
inflect = "5.3.0"
pathspec = "0.8.1"
stringcase = "1.2.0"
pyfiglet = "0.8.post1"
PyInquirer = "1.0.3"
dacite = "1.6.0"

[tool.poetry.dev-dependencies]
pylint = "2.8.3"
black = "21.6b0"
pytest = "6.2.4"
pytest-cov = "2.12.1"
graphql-core = "3.1.5"
openapi-spec-validator = "0.3.1"

[tool.poetry.scripts]
qsdl = "qsdl.__main__:entrypoint"

[tool.pytest.ini_options]
junit_family = "xunit2"
addopts = "--junitxml=dist/tests/report.xml --cov=qsdl --cov-report term --cov-report html:dist/coverage"
testpaths = [
    "tests",
]

[tool.pylint.SIMILARITIES]
min-similarity-lines = 10

[tool.pylint.messages_control]
disable = [
    "protected-access",
    "bad-continuation",
    "too-few-public-methods",
    "too-many-instance-attributes",
    "line-too-long",
    "duplicate-code",
    "cyclic-import",
]

[tool.black]
line-length = 120

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
]

[build-system]
requires = ["poetry>=0.12"]
build-backend = "poetry.masonry.api"
