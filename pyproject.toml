[tool.poetry]
name = "qsdl"
version = "1.0.0"
description = "A Schema-Definition-Language Generator inspired by GraphQl."
authors = ["henn1001 <henn1001@outlook.com>"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://gitlab.com/henn1001/qsdl"
repository = "https://gitlab.com/henn1001/qsdl"
include = [
    "README.md",
    "qsdl/definition/entity.tx",
    "qsdl/templates/openapi.j2",
    "qsdl/templates/openapi.macro.j2",
    "qsdl/templates/graphql.j2",
    "qsdl/templates/graphql.macro.j2",
    "qsdl/templates/uml.j2",
]

[tool.poetry.dependencies]
python = "^3.6"
textx = "^2.2.0"
plantuml = "^0.3.0"
jinja2 = "^2.11.2"
inflect = "^4.1.0"
click = "^7.1.2"

[tool.poetry.dev-dependencies]
pylint = "^2.5.3"
black = "^19.10b0"
pytest = "^6.0.1"
pytest-cov = "^2.10.0"
pyyaml = "^5.3.1"
graphql-core = "^3.1.2"

[tool.poetry.scripts]
qsdl = "qsdl.__main__:entrypoint"

[tool.pytest.ini_options]
junit_family = "xunit2"
addopts = "--junitxml=dist/tests/report.xml --cov=qsdl --cov-report term --cov-report html:dist/coverage"
testpaths = [
    "tests",
]

[tool.pylint.messages_control]
disable = [
    "protected-access",
    "bad-continuation",
    "too-few-public-methods",
    "too-many-instance-attributes",
]

[build-system]
requires = ["poetry>=0.12"]
build-backend = "poetry.masonry.api"
